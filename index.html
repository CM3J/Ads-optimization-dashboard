<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad Accounts Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB60SW3dX1_gkrEFO57IVxhK6Lleqw8W1Y",
      authDomain: "conners-project-efd08.firebaseapp.com",
      projectId: "conners-project-efd08",
      storageBucket: "conners-project-efd08.firebasestorage.app",
      messagingSenderId: "195622519111",
      appId: "1:195622519111:web:e7204fcf6e1cf9d9870c62"
    };

    const app = initializeApp(firebaseConfig);
    window.__firebaseApp = app;
    window.__firebaseAuth = getAuth(app);
    window.__firebaseDb = getFirestore(app);
    window.__firebaseReady = true;
    window.dispatchEvent(new Event("firebaseReady"));
  </script>

  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Lucide icons as inline SVG components
    const Icon = ({ d, size = 16 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {Array.isArray(d) ? d.map((path, i) => <path key={i} d={path} />) : <path d={d} />}
      </svg>
    );
    const Plus = () => <Icon d="M12 5v14M5 12h14" />;
    const ArrowLeft = () => <Icon d="M19 12H5M12 19l-7-7 7-7" />;
    const Calendar = () => <Icon d={["M8 2v4M16 2v4","M3 10h18","M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"]} />;
    const Trash2 = () => <Icon d={["M3 6h18","M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6","M10 11v6M14 11v6","M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"]} />;
    const Clock = () => <Icon d={["M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20","M12 6v6l4 2"]} />;
    const CheckCircle2 = () => <Icon d={["M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20","M9 12l2 2 4-4"]} size={24} />;
    const Circle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/></svg>;
    const AlertCircle = () => <Icon d={["M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20","M12 8v4M12 16h.01"]} size={40} />;
    const RefreshCw = () => <Icon d={["M3 12a9 9 0 0 1 15-6.7L21 8","M21 12a9 9 0 0 1-15 6.7L3 16","M3 16H8M16 8h5"]} size={32} />;
    const AlignLeft = () => <Icon d={["M3 6h18","M3 12h12","M3 18h15"]} />;
    const CalendarDays = () => <Icon d={["M8 2v4M16 2v4","M3 10h18","M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z","M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"]} />;

    // --- Constants ---
    const PRIORITIES = ["Not urgent", "Important", "Next Step", "Ongoing"];
    const CATEGORY_ORDER = ["Google Ads", "META Ads", "LinkedIn Ads"];
    const INITIAL_CHECKLIST = {
      "Google Ads": [
        "Pause All old Promo Assets (comparing with offers pages on sites)",
        "Look at offer page and add promo assets for existing promos",
        "Create ads for existing offers where ads are not present",
        "Check Price Assets and Ensure they align with web prices",
        "Check other assets i.e SItelinks, Callouts, etc. For relevance",
        "Check Ads are running!",
        "Check ad copy on all ads for mention of old/irrelevant promos & update"
      ],
      "META Ads": [
        "Check Current running Promos and if they are relevant to offers page",
        "Switch off/on any of the ones that should or shouldn't be running",
        "Double Check details of Promo is correct (if still running)",
        "Identify potential New Promos and bring to team",
        "Check Ads are running!",
        "Check ad copy on all ads for mention of old/irrelevant promos & update"
      ],
      "LinkedIn Ads": [
        "Check Current running Promos and if they are relevant to offers page",
        "Switch off/on any of the ones that should or shouldn't be running",
        "Double Check details of Promo is correct (if still running)",
        "Identify potential New Promos and bring to team",
        "Check Ads are running!",
        "Check ad copy on all ads for mention of old/irrelevant promos & update"
      ]
    };

    const generateChecklistData = () => {
      const data = {};
      for (const [category, tasks] of Object.entries(INITIAL_CHECKLIST)) {
        data[category] = tasks.map(task => ({
          id: crypto.randomUUID(), text: task, completed: false, priority: "Not urgent"
        }));
      }
      return data;
    };

    const getStatus = (lastUpdatedIso) => {
      if (!lastUpdatedIso) return { color: 'bg-red-500', text: 'text-red-600', bg: 'bg-red-50', label: 'Overdue (> 12w)' };
      const diffWeeks = (Date.now() - new Date(lastUpdatedIso).getTime()) / (1000 * 60 * 60 * 24 * 7);
      if (diffWeeks < 6) return { color: 'bg-green-500', text: 'text-green-600', bg: 'bg-green-50', label: 'Healthy (< 6w)' };
      if (diffWeeks < 12) return { color: 'bg-orange-500', text: 'text-orange-600', bg: 'bg-orange-50', label: 'Warning (6-12w)' };
      return { color: 'bg-red-500', text: 'text-red-600', bg: 'bg-red-50', label: 'Action Required (> 12w)' };
    };

    const formatDate = (iso) => {
      if (!iso) return "Never";
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    };

    // --- Main App ---
    function App() {
      const [user, setUser] = useState(null);
      const [clients, setClients] = useState([]);
      const [selectedClientId, setSelectedClientId] = useState(null);
      const [isAddingClient, setIsAddingClient] = useState(false);
      const [newClientName, setNewClientName] = useState('');
      const [newClientNotes, setNewClientNotes] = useState('');
      const [newClientNextUpdate, setNewClientNextUpdate] = useState('');
      const [isLoading, setIsLoading] = useState(true);
      const [firebaseReady, setFirebaseReady] = useState(window.__firebaseReady || false);

      const appId = 'ad-agency-dash';

      useEffect(() => {
        if (firebaseReady) return;
        const handler = () => setFirebaseReady(true);
        window.addEventListener("firebaseReady", handler);
        return () => window.removeEventListener("firebaseReady", handler);
      }, [firebaseReady]);

      useEffect(() => {
        if (!firebaseReady) return;
        const { signInAnonymously, onAuthStateChanged } = window.firebaseAuthModule || {};

        import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js").then(({ signInAnonymously, onAuthStateChanged }) => {
          signInAnonymously(window.__firebaseAuth).catch(console.error);
          const unsub = onAuthStateChanged(window.__firebaseAuth, (u) => {
            setUser(u);
            if (!u) setIsLoading(false);
          });
          return unsub;
        });
      }, [firebaseReady]);

      useEffect(() => {
        if (!user) return;
        let unsub;
        import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js").then(({ collection, onSnapshot }) => {
          const ref = collection(window.__firebaseDb, 'artifacts', appId, 'public', 'data', 'clients');
          unsub = onSnapshot(ref, (snap) => {
            const fetched = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            fetched.sort((a, b) => (a.lastUpdated ? new Date(a.lastUpdated).getTime() : 0) - (b.lastUpdated ? new Date(b.lastUpdated).getTime() : 0));
            setClients(fetched);
            setIsLoading(false);
          }, (err) => { console.error(err); setIsLoading(false); });
        });
        return () => unsub && unsub();
      }, [user]);

      const handleAddClient = async (e) => {
        e.preventDefault();
        if (!newClientName.trim() || !user) return;
        const { doc, collection, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        const newClient = {
          name: newClientName.trim(), notes: newClientNotes.trim(),
          nextUpdate: newClientNextUpdate, lastUpdated: new Date().toISOString(),
          createdAt: new Date().toISOString(), checklist: generateChecklistData()
        };
        try {
          const ref = doc(collection(window.__firebaseDb, 'artifacts', appId, 'public', 'data', 'clients'));
          await setDoc(ref, newClient);
          setNewClientName(''); setNewClientNotes(''); setNewClientNextUpdate(''); setIsAddingClient(false);
        } catch (err) { console.error(err); }
      };

      const handleDeleteClient = async (id, e) => {
        e.stopPropagation();
        if (!window.confirm("Are you sure you want to delete this client? This cannot be undone.")) return;
        const { doc, deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        try {
          await deleteDoc(doc(window.__firebaseDb, 'artifacts', appId, 'public', 'data', 'clients', id));
          if (selectedClientId === id) setSelectedClientId(null);
        } catch (err) { console.error(err); }
      };

      const updateClientChecklist = async (clientId, updatedChecklist) => {
        const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        const safe = Object.fromEntries(Object.entries(updatedChecklist).map(([cat, tasks]) => [cat, tasks.map(t => ({ ...t }))]));
        try {
          await setDoc(doc(window.__firebaseDb, 'artifacts', appId, 'public', 'data', 'clients', clientId), { checklist: safe }, { merge: true });
        } catch (err) { console.error(err); }
      };

      const markClientUpdated = async (clientId) => {
        const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        try {
          await setDoc(doc(window.__firebaseDb, 'artifacts', appId, 'public', 'data', 'clients', clientId), { lastUpdated: new Date().toISOString() }, { merge: true });
        } catch (err) { console.error(err); }
      };

      const handleUpdateField = async (clientId, field, value) => {
        const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        try {
          await setDoc(doc(window.__firebaseDb, 'artifacts', appId, 'public', 'data', 'clients', clientId), { [field]: value }, { merge: true });
        } catch (err) { console.error(err); }
      };

      if (!firebaseReady || isLoading) return (
        <div className="min-h-screen bg-slate-50 flex items-center justify-center">
          <div className="text-blue-500"><RefreshCw /></div>
        </div>
      );

      const selectedClient = clients.find(c => c.id === selectedClientId);

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800">
          <header className="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-10">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-4">
                {selectedClientId && (
                  <button onClick={() => setSelectedClientId(null)} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <span className="text-slate-600"><ArrowLeft /></span>
                  </button>
                )}
                <h1 className="text-xl font-bold text-slate-800">
                  {selectedClientId ? selectedClient?.name : "Ad Accounts Dashboard"}
                </h1>
              </div>
              {!selectedClientId && (
                <button onClick={() => setIsAddingClient(true)} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                  <Plus /> Add Client
                </button>
              )}
            </div>
          </header>

          <main className="max-w-6xl mx-auto p-6">
            {isAddingClient && !selectedClientId && (
              <div className="mb-8 p-6 bg-white rounded-xl shadow-sm border border-slate-200">
                <h2 className="text-lg font-semibold mb-4">Add New Ad Account</h2>
                <form onSubmit={handleAddClient} className="flex flex-col gap-4">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <input type="text" placeholder="Client / Company Name *" value={newClientName}
                      onChange={e => setNewClientName(e.target.value)}
                      className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" autoFocus required />
                    <div className="flex items-center gap-2 px-4 py-2 border border-slate-300 rounded-lg">
                      <span className="text-slate-400"><CalendarDays /></span>
                      <input type="date" value={newClientNextUpdate} onChange={e => setNewClientNextUpdate(e.target.value)}
                        className="w-full bg-transparent focus:outline-none text-slate-700" />
                    </div>
                  </div>
                  <textarea placeholder="Client Notes (Optional)" value={newClientNotes} onChange={e => setNewClientNotes(e.target.value)}
                    className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-24 resize-y" />
                  <div className="flex justify-end gap-3">
                    <button type="button" onClick={() => setIsAddingClient(false)} className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium">Cancel</button>
                    <button type="submit" className="px-6 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-lg font-medium">Save Client</button>
                  </div>
                </form>
              </div>
            )}

            {!selectedClientId && (
              <>
                {clients.length === 0 && !isAddingClient ? (
                  <div className="text-center py-20">
                    <div className="bg-white w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm border border-slate-100 text-slate-300">
                      <AlertCircle />
                    </div>
                    <h3 className="text-lg font-medium text-slate-900 mb-1">No clients yet</h3>
                    <p className="text-slate-500">Add your first client to start tracking their ad accounts.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {clients.map(client => {
                      const status = getStatus(client.lastUpdated);
                      let total = 0, done = 0;
                      Object.values(client.checklist || {}).forEach(tasks => tasks.forEach(t => { total++; if (t.completed) done++; }));
                      const progress = total > 0 ? Math.round((done / total) * 100) : 0;
                      return (
                        <div key={client.id} onClick={() => setSelectedClientId(client.id)}
                          className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 hover:shadow-md hover:border-slate-300 transition-all cursor-pointer group flex flex-col">
                          <div className="flex justify-between items-start mb-4">
                            <h2 className="text-lg font-bold text-slate-800 pr-4">{client.name}</h2>
                            <button onClick={e => handleDeleteClient(client.id, e)}
                              className="opacity-0 group-hover:opacity-100 p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all">
                              <Trash2 />
                            </button>
                          </div>
                          <div className="mt-auto space-y-4">
                            <div className={`flex items-center gap-2 text-sm font-medium px-3 py-2 rounded-lg ${status.bg} ${status.text}`}>
                              <div className={`w-3 h-3 rounded-full ${status.color}`} />{status.label}
                            </div>
                            <div className="flex items-center justify-between text-sm text-slate-500">
                              <span className="flex items-center gap-1.5"><Clock /> {formatDate(client.lastUpdated)}</span>
                              <span className="font-medium">{progress}% Done</span>
                            </div>
                            {client.nextUpdate && (
                              <div className="flex items-center gap-1.5 text-sm text-blue-600 bg-blue-50 px-3 py-2 rounded-lg border border-blue-100">
                                <CalendarDays /><span className="font-medium">Next: {formatDate(client.nextUpdate)}</span>
                              </div>
                            )}
                            <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                              <div className="bg-blue-500 h-full rounded-full transition-all duration-500" style={{ width: `${progress}%` }} />
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </>
            )}

            {selectedClientId && selectedClient && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="bg-slate-50 border-b border-slate-200 p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                  <div className="space-y-2">
                    <div className="flex items-center gap-3">
                      <span className="text-sm text-slate-500 font-medium">Last updated:</span>
                      <span className="text-sm font-bold text-slate-800">{formatDate(selectedClient.lastUpdated)}</span>
                      <span className={`inline-block w-2.5 h-2.5 rounded-full ${getStatus(selectedClient.lastUpdated).color}`} />
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="text-sm text-slate-500 font-medium">Next update:</span>
                      <input type="date" value={selectedClient.nextUpdate || ''} onChange={e => handleUpdateField(selectedClient.id, 'nextUpdate', e.target.value)}
                        className="text-sm bg-white border border-slate-300 rounded-md px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <p className="text-xs text-slate-400">Robot Status: Green &lt; 6w | Orange 6-12w | Red &gt; 12w</p>
                  </div>
                  <button onClick={() => markClientUpdated(selectedClient.id)}
                    className="flex items-center gap-2 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-4 py-2.5 rounded-lg font-medium shadow-sm transition-colors w-full md:w-auto justify-center">
                    <Calendar /> Mark as Updated Today
                  </button>
                </div>

                <div className="p-6 border-b border-slate-100">
                  <div className="flex items-center gap-2 mb-3 text-slate-800 font-bold">
                    <AlignLeft /><h3>Client Notes</h3>
                  </div>
                  <textarea key={`notes-${selectedClient.id}`} defaultValue={selectedClient.notes || ''}
                    onBlur={e => handleUpdateField(selectedClient.id, 'notes', e.target.value)}
                    placeholder="Add ongoing notes, context, or key contacts here... (Saves automatically when you click away)"
                    className="w-full p-4 border border-slate-200 rounded-lg bg-slate-50 hover:bg-white focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors min-h-28 resize-y text-sm text-slate-700" />
                </div>

                <div className="p-6 space-y-10">
                  {CATEGORY_ORDER.map(category => {
                    const tasks = selectedClient.checklist?.[category] || [];
                    const completedCount = tasks.filter(t => t.completed).length;
                    if (tasks.length === 0) return null;
                    return (
                      <div key={category} className="space-y-4">
                        <div className="flex items-center justify-between border-b border-slate-200 pb-2">
                          <h3 className="text-lg font-bold text-slate-800">{category}</h3>
                          <span className="text-sm font-medium text-slate-500 bg-slate-100 px-2.5 py-1 rounded-full">{completedCount} / {tasks.length}</span>
                        </div>
                        <div className="space-y-2">
                          {tasks.map(task => (
                            <div key={task.id} className={`flex items-start sm:items-center gap-3 p-3 rounded-lg border transition-colors ${task.completed ? 'bg-slate-50 border-slate-200 opacity-75' : 'bg-white border-slate-200 hover:border-slate-300 shadow-sm'}`}>
                              <button onClick={() => {
                                const newChecklist = { ...selectedClient.checklist, [category]: selectedClient.checklist[category].map(t => t.id === task.id ? { ...t, completed: !t.completed } : t) };
                                updateClientChecklist(selectedClient.id, newChecklist);
                              }} className="flex-shrink-0 focus:outline-none">
                                {task.completed ? <span className="text-green-500"><CheckCircle2 /></span> : <span className="text-slate-300 hover:text-blue-500"><Circle /></span>}
                              </button>
                              <span className={`flex-1 text-sm ${task.completed ? 'text-slate-500 line-through' : 'text-slate-800'}`}>{task.text}</span>
                              <select value={task.priority} onChange={e => {
                                const newChecklist = { ...selectedClient.checklist, [category]: selectedClient.checklist[category].map(t => t.id === task.id ? { ...t, priority: e.target.value } : t) };
                                updateClientChecklist(selectedClient.id, newChecklist);
                              }} className={`text-xs border rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500 ${task.priority === 'Important' ? 'bg-red-50 text-red-700 border-red-200' : task.priority === 'Next Step' ? 'bg-blue-50 text-blue-700 border-blue-200' : task.priority === 'Ongoing' ? 'bg-purple-50 text-purple-700 border-purple-200' : 'bg-slate-50 text-slate-600 border-slate-200'}`}>
                                {PRIORITIES.map(p => <option key={p} value={p}>{p}</option>)}
                              </select>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

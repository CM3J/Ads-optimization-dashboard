<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad Accounts Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase compat SDKs (work as global window.firebase, no import() needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyB60SW3dX1_gkrEFO57IVxhK6Lleqw8W1Y",
      authDomain: "conners-project-efd08.firebaseapp.com",
      projectId: "conners-project-efd08",
      storageBucket: "conners-project-efd08.firebasestorage.app",
      messagingSenderId: "195622519111",
      appId: "1:195622519111:web:e7204fcf6e1cf9d9870c62"
    });
    const auth = firebase.auth();
    const db   = firebase.firestore();
    const APP_ID = 'ad-agency-dash';
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Icons ---
    const Svg = ({ d, size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" xmlns="http://www.w3.org/2000/svg">
        {[].concat(d).map((p, i) => <path key={i} d={p} />)}
      </svg>
    );
    const PlusIcon      = () => <Svg d={["M12 5v14","M5 12h14"]} />;
    const BackIcon      = () => <Svg d={["M19 12H5","M12 19l-7-7 7-7"]} />;
    const CalIcon       = () => <Svg d={["M8 2v4","M16 2v4","M3 10h18","M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"]} />;
    const TrashIcon     = () => <Svg d={["M3 6h18","M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6","M10 11v6","M14 11v6","M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"]} />;
    const ClockIcon     = () => <Svg d={["M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20","M12 6v6l4 2"]} />;
    const CheckIcon     = () => <Svg d={["M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20","M9 12l2 2 4-4"]} size={22} />;
    const EmptyCircle   = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10"/></svg>;
    const AlertIcon     = () => <Svg d={["M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20","M12 8v4","M12 16h.01"]} size={40} />;
    const NotesIcon     = () => <Svg d={["M3 6h18","M3 12h12","M3 18h15"]} />;
    const CalDaysIcon   = () => <Svg d={["M8 2v4","M16 2v4","M3 10h18","M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z","M8 14h.01","M12 14h.01","M16 14h.01","M8 18h.01","M12 18h.01"]} />;

    // --- Constants ---
    const PRIORITIES = ["Not urgent", "Important", "Next Step", "Ongoing"];
    const CATEGORY_ORDER = ["Google Ads", "META Ads", "LinkedIn Ads"];
    const INITIAL_CHECKLIST = {
      "Google Ads": [
        "Pause All old Promo Assets (comparing with offers pages on sites)",
        "Look at offer page and add promo assets for existing promos",
        "Create ads for existing offers where ads are not present",
        "Check Price Assets and Ensure they align with web prices",
        "Check other assets i.e SItelinks, Callouts, etc. For relevance",
        "Check Ads are running!",
        "Check ad copy on all ads for mention of old/irrelevant promos & update"
      ],
      "META Ads": [
        "Check Current running Promos and if they are relevant to offers page",
        "Switch off/on any of the ones that should or shouldn't be running",
        "Double Check details of Promo is correct (if still running)",
        "Identify potential New Promos and bring to team",
        "Check Ads are running!",
        "Check ad copy on all ads for mention of old/irrelevant promos & update"
      ],
      "LinkedIn Ads": [
        "Check Current running Promos and if they are relevant to offers page",
        "Switch off/on any of the ones that should or shouldn't be running",
        "Double Check details of Promo is correct (if still running)",
        "Identify potential New Promos and bring to team",
        "Check Ads are running!",
        "Check ad copy on all ads for mention of old/irrelevant promos & update"
      ]
    };

    const makeChecklist = () => {
      const out = {};
      for (const [cat, tasks] of Object.entries(INITIAL_CHECKLIST)) {
        out[cat] = tasks.map(text => ({ id: crypto.randomUUID(), text, completed: false, priority: "Not urgent" }));
      }
      return out;
    };

    const getStatus = (iso) => {
      if (!iso) return { dot: 'bg-red-500', text: 'text-red-600', bg: 'bg-red-50', label: 'Overdue (> 12w)' };
      const w = (Date.now() - new Date(iso).getTime()) / 604800000;
      if (w < 6)  return { dot: 'bg-green-500',  text: 'text-green-600',  bg: 'bg-green-50',  label: 'Healthy (< 6w)' };
      if (w < 12) return { dot: 'bg-orange-500', text: 'text-orange-600', bg: 'bg-orange-50', label: 'Warning (6-12w)' };
      return { dot: 'bg-red-500', text: 'text-red-600', bg: 'bg-red-50', label: 'Action Required (> 12w)' };
    };

    const fmt = (iso) => iso
      ? new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      : "Never";

    const colRef = () =>
      db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('clients');

    // --- Main Component ---
    function App() {
      const [user,       setUser]       = useState(null);
      const [clients,    setClients]    = useState([]);
      const [selId,      setSelId]      = useState(null);
      const [adding,     setAdding]     = useState(false);
      const [newName,    setNewName]    = useState('');
      const [newNotes,   setNewNotes]   = useState('');
      const [newNext,    setNewNext]    = useState('');
      const [loading,    setLoading]    = useState(true);

      useEffect(() => {
        auth.signInAnonymously().catch(console.error);
        return auth.onAuthStateChanged(u => {
          setUser(u);
          if (!u) setLoading(false);
        });
      }, []);

      useEffect(() => {
        if (!user) return;
        return colRef().onSnapshot(snap => {
          const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          list.sort((a, b) =>
            (a.lastUpdated ? new Date(a.lastUpdated).getTime() : 0) -
            (b.lastUpdated ? new Date(b.lastUpdated).getTime() : 0)
          );
          setClients(list);
          setLoading(false);
        }, err => { console.error(err); setLoading(false); });
      }, [user]);

      const addClient = async (e) => {
        e.preventDefault();
        if (!newName.trim()) return;
        try {
          await colRef().add({
            name: newName.trim(), notes: newNotes.trim(), nextUpdate: newNext,
            lastUpdated: new Date().toISOString(), createdAt: new Date().toISOString(),
            checklist: makeChecklist()
          });
          setNewName(''); setNewNotes(''); setNewNext(''); setAdding(false);
        } catch (e) { console.error(e); }
      };

      const deleteClient = async (id, e) => {
        e.stopPropagation();
        if (!confirm("Delete this client? This cannot be undone.")) return;
        try { await colRef().doc(id).delete(); if (selId === id) setSelId(null); }
        catch (e) { console.error(e); }
      };

      const saveChecklist = async (id, cl) => {
        const safe = Object.fromEntries(Object.entries(cl).map(([cat, tasks]) => [cat, tasks.map(t => ({ ...t }))]));
        try { await colRef().doc(id).update({ checklist: safe }); } catch (e) { console.error(e); }
      };

      const markUpdated = async (id) => {
        try { await colRef().doc(id).update({ lastUpdated: new Date().toISOString() }); } catch (e) { console.error(e); }
      };

      const updateField = async (id, field, val) => {
        try { await colRef().doc(id).update({ [field]: val }); } catch (e) { console.error(e); }
      };

      if (loading) return (
        <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center gap-3 text-slate-400">
          <div style={{animation:'spin 1s linear infinite', display:'inline-block'}}>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" strokeWidth="2" strokeLinecap="round">
              <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 16H8"/><path d="M16 8h5"/>
            </svg>
          </div>
          <span className="text-sm">Connecting...</span>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      );

      const sel = clients.find(c => c.id === selId);

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800">

          <header className="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-10 shadow-sm">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-3">
                {selId && (
                  <button onClick={() => setSelId(null)} className="p-2 hover:bg-slate-100 rounded-full text-slate-600">
                    <BackIcon />
                  </button>
                )}
                <h1 className="text-xl font-bold">{selId ? sel?.name : "Ad Accounts Dashboard"}</h1>
              </div>
              {!selId && (
                <button onClick={() => setAdding(true)} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium">
                  <PlusIcon /> Add Client
                </button>
              )}
            </div>
          </header>

          <main className="max-w-6xl mx-auto p-6">

            {adding && !selId && (
              <div className="mb-8 p-6 bg-white rounded-xl shadow-sm border border-slate-200">
                <h2 className="text-lg font-semibold mb-4">Add New Ad Account</h2>
                <form onSubmit={addClient} className="flex flex-col gap-4">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <input type="text" placeholder="Client / Company Name *" value={newName} onChange={e => setNewName(e.target.value)}
                      className="px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" autoFocus required />
                    <div className="flex items-center gap-2 px-4 py-2 border border-slate-300 rounded-lg text-slate-400">
                      <CalDaysIcon />
                      <input type="date" value={newNext} onChange={e => setNewNext(e.target.value)}
                        className="flex-1 bg-transparent focus:outline-none text-slate-700" />
                    </div>
                  </div>
                  <textarea placeholder="Client Notes (Optional)" value={newNotes} onChange={e => setNewNotes(e.target.value)}
                    className="px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y" rows="3" />
                  <div className="flex justify-end gap-3">
                    <button type="button" onClick={() => setAdding(false)} className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg">Cancel</button>
                    <button type="submit" className="px-6 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-lg font-medium">Save Client</button>
                  </div>
                </form>
              </div>
            )}

            {!selId && (
              clients.length === 0 && !adding ? (
                <div className="text-center py-20">
                  <div className="bg-white w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm border text-slate-300"><AlertIcon /></div>
                  <h3 className="text-lg font-medium text-slate-900 mb-1">No clients yet</h3>
                  <p className="text-slate-500">Add your first client to start tracking.</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  {clients.map(c => {
                    const s = getStatus(c.lastUpdated);
                    let total = 0, done = 0;
                    Object.values(c.checklist || {}).forEach(ts => ts.forEach(t => { total++; if (t.completed) done++; }));
                    const pct = total > 0 ? Math.round(done / total * 100) : 0;
                    return (
                      <div key={c.id} onClick={() => setSelId(c.id)}
                        className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 hover:shadow-md hover:border-slate-300 transition-all cursor-pointer group flex flex-col">
                        <div className="flex justify-between items-start mb-4">
                          <h2 className="text-lg font-bold pr-4">{c.name}</h2>
                          <button onClick={e => deleteClient(c.id, e)}
                            className="opacity-0 group-hover:opacity-100 p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all">
                            <TrashIcon />
                          </button>
                        </div>
                        <div className="mt-auto space-y-3">
                          <div className={`flex items-center gap-2 text-sm font-medium px-3 py-2 rounded-lg ${s.bg} ${s.text}`}>
                            <div className={`w-3 h-3 rounded-full ${s.dot}`} />{s.label}
                          </div>
                          <div className="flex justify-between text-sm text-slate-500">
                            <span className="flex items-center gap-1.5"><ClockIcon /> {fmt(c.lastUpdated)}</span>
                            <span className="font-medium">{pct}% Done</span>
                          </div>
                          {c.nextUpdate && (
                            <div className="flex items-center gap-2 text-sm text-blue-600 bg-blue-50 px-3 py-2 rounded-lg border border-blue-100">
                              <CalDaysIcon /><span className="font-medium">Next: {fmt(c.nextUpdate)}</span>
                            </div>
                          )}
                          <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                            <div className="bg-blue-500 h-full rounded-full transition-all duration-500" style={{ width: `${pct}%` }} />
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )
            )}

            {selId && sel && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">

                <div className="bg-slate-50 border-b border-slate-200 p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                  <div className="space-y-2">
                    <div className="flex items-center gap-3">
                      <span className="text-sm text-slate-500">Last updated:</span>
                      <span className="text-sm font-bold">{fmt(sel.lastUpdated)}</span>
                      <span className={`w-2.5 h-2.5 rounded-full inline-block ${getStatus(sel.lastUpdated).dot}`} />
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="text-sm text-slate-500">Next update:</span>
                      <input type="date" value={sel.nextUpdate || ''} onChange={e => updateField(sel.id, 'nextUpdate', e.target.value)}
                        className="text-sm bg-white border border-slate-300 rounded-md px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <p className="text-xs text-slate-400">Green &lt; 6w | Orange 6-12w | Red &gt; 12w</p>
                  </div>
                  <button onClick={() => markUpdated(sel.id)}
                    className="flex items-center gap-2 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-4 py-2.5 rounded-lg font-medium shadow-sm w-full md:w-auto justify-center">
                    <CalIcon /> Mark as Updated Today
                  </button>
                </div>

                <div className="p-6 border-b border-slate-100">
                  <div className="flex items-center gap-2 mb-3 font-bold text-slate-800"><NotesIcon /><h3>Client Notes</h3></div>
                  <textarea key={`n-${sel.id}`} defaultValue={sel.notes || ''}
                    onBlur={e => updateField(sel.id, 'notes', e.target.value)}
                    placeholder="Add notes here... (saves when you click away)"
                    className="w-full p-4 border border-slate-200 rounded-lg bg-slate-50 hover:bg-white focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-slate-700 resize-y" rows="4" />
                </div>

                <div className="p-6 space-y-10">
                  {CATEGORY_ORDER.map(cat => {
                    const tasks = sel.checklist?.[cat] || [];
                    const done = tasks.filter(t => t.completed).length;
                    if (!tasks.length) return null;
                    return (
                      <div key={cat}>
                        <div className="flex items-center justify-between border-b border-slate-200 pb-2 mb-4">
                          <h3 className="text-lg font-bold">{cat}</h3>
                          <span className="text-sm text-slate-500 bg-slate-100 px-2.5 py-1 rounded-full">{done} / {tasks.length}</span>
                        </div>
                        <div className="space-y-2">
                          {tasks.map(task => (
                            <div key={task.id} className={`flex items-center gap-3 p-3 rounded-lg border transition-colors ${task.completed ? 'bg-slate-50 border-slate-100 opacity-70' : 'bg-white border-slate-200 hover:border-slate-300 shadow-sm'}`}>
                              <button className="flex-shrink-0" onClick={() => {
                                const nc = { ...sel.checklist, [cat]: sel.checklist[cat].map(t => t.id === task.id ? { ...t, completed: !t.completed } : t) };
                                saveChecklist(sel.id, nc);
                              }}>
                                {task.completed
                                  ? <span className="text-green-500"><CheckIcon /></span>
                                  : <span className="text-slate-300"><EmptyCircle /></span>}
                              </button>
                              <span className={`flex-1 text-sm ${task.completed ? 'line-through text-slate-400' : 'text-slate-800'}`}>{task.text}</span>
                              <select value={task.priority} onChange={e => {
                                const nc = { ...sel.checklist, [cat]: sel.checklist[cat].map(t => t.id === task.id ? { ...t, priority: e.target.value } : t) };
                                saveChecklist(sel.id, nc);
                              }} className={`text-xs border rounded-md px-2 py-1.5 ${task.priority === 'Important' ? 'bg-red-50 text-red-700 border-red-200' : task.priority === 'Next Step' ? 'bg-blue-50 text-blue-700 border-blue-200' : task.priority === 'Ongoing' ? 'bg-purple-50 text-purple-700 border-purple-200' : 'bg-slate-50 text-slate-600 border-slate-200'}`}>
                                {PRIORITIES.map(p => <option key={p} value={p}>{p}</option>)}
                              </select>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
